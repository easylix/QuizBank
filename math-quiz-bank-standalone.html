<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>高中数学题库</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <style>
/* ===== 全局 ===== */
:root {
  --primary: #4f46e5;
  --primary-light: #eef2ff;
  --primary-hover: #4338ca;
  --bg: #f8fafc;
  --card-bg: #ffffff;
  --border: #e2e8f0;
  --text: #1e293b;
  --text-muted: #64748b;
  --danger: #ef4444;
  --success: #22c55e;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

/* ===== Header ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo { font-size: 1.15rem; font-weight: 700; flex: 1; }
.menu-btn {
  display: none;
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
  color: var(--text);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.stats-badge {
  font-size: .8rem;
  background: var(--primary-light);
  color: var(--primary);
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}

/* ===== Layout ===== */
.layout {
  display: flex;
  max-width: 1400px;
  margin: 0 auto;
  min-height: calc(100vh - 60px);
}

/* ===== Sidebar ===== */
.sidebar {
  width: 280px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--card-bg);
  overflow-y: auto;
  height: calc(100vh - 60px);
  position: sticky;
  top: 60px;
  transition: transform .25s ease;
}
.sidebar-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.sidebar-header h3 { font-size: .9rem; }

/* Tree */
.tree-container { padding: 8px 0; }
.tree-module { }
.tree-module-header {
  padding: 8px 16px;
  cursor: pointer;
  font-weight: 600;
  font-size: .88rem;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background .15s;
}
.tree-module-header:hover { background: var(--primary-light); }
.tree-module-header .arrow {
  transition: transform .2s;
  font-size: .7rem;
  width: 16px;
}
.tree-module-header .arrow.open { transform: rotate(90deg); }

.tree-chapter { padding-left: 8px; display: none; }
.tree-module.open > .tree-chapter { display: block; }
.tree-chapter-header {
  padding: 6px 16px 6px 24px;
  cursor: pointer;
  font-size: .82rem;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background .15s;
  color: var(--text-muted);
}
.tree-chapter-header:hover {
  background: var(--primary-light);
  color: var(--text);
}
.tree-chapter-header .arrow { transition: transform .2s; font-size: .6rem; width: 12px; }
.tree-chapter-header .arrow.open { transform: rotate(90deg); }
.tree-topics { padding-left: 0; display: none; }
.tree-chapter.open > .tree-topics { display: block; }

.tree-topic {
  padding: 5px 16px 5px 36px;
  font-size: .8rem;
  cursor: pointer;
  border-radius: 0 20px 20px 0;
  transition: all .15s;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.tree-topic:hover { background: var(--primary-light); color: var(--text); }
.tree-topic.active {
  background: var(--primary);
  color: #fff;
  font-weight: 500;
}
.tree-topic .count {
  margin-left: auto;
  font-size: .7rem;
  opacity: .7;
  background: rgba(255,255,255,.2);
  padding: 0 6px;
  border-radius: 8px;
}

/* ===== Main ===== */
.main {
  flex: 1;
  padding: 16px;
  overflow-y: auto;
}

/* ===== Toolbar ===== */
.toolbar {
  margin-bottom: 16px;
}
.toolbar-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar-row + .toolbar-row { margin-top: 8px; }
.search-box {
  flex: 1;
  min-width: 200px;
}
.search-box input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: .9rem;
  outline: none;
  transition: border .2s;
}
.search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.1); }

.filter-select {
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: .85rem;
  background: var(--card-bg);
  cursor: pointer;
  min-width: 100px;
}
.result-count {
  font-size: .82rem;
  color: var(--text-muted);
  margin-left: auto;
}

/* ===== Question List ===== */
.question-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: .9rem; }

/* Question Card */
.q-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: all .2s;
}
.q-card:hover {
  box-shadow: 0 4px 12px rgba(0,0,0,.08);
  border-color: var(--primary);
}
.q-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.q-badge {
  display: inline-block;
  font-size: .72rem;
  padding: 2px 8px;
  border-radius: 12px;
  font-weight: 500;
}
.q-badge-topic {
  background: #dbeafe;
  color: #1d4ed8;
}
.q-badge-type {
  background: #f3e8ff;
  color: #7c3aed;
}
.q-badge-difficulty-easy { background: #dcfce7; color: #16a34a; }
.q-badge-difficulty-mid  { background: #fef9c3; color: #ca8a04; }
.q-badge-difficulty-hard { background: #fee2e2; color: #dc2626; }

.q-card-content {
  font-size: .93rem;
  line-height: 1.7;
  margin-bottom: 8px;
}
.q-card-answer {
  font-size: .82rem;
  color: var(--success);
  font-weight: 500;
}
.q-card-answer .hidden-answer {
  color: var(--primary);
  cursor: pointer;
}
.q-card-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.q-card-footer button {
  background: none;
  border: none;
  cursor: pointer;
  font-size: .8rem;
  color: var(--text-muted);
  padding: 4px 8px;
  border-radius: 6px;
  transition: all .15s;
}
.q-card-footer button:hover { background: var(--primary-light); color: var(--primary); }
.q-card-footer .btn-del:hover { background: #fee2e2; color: var(--danger); }

/* ===== Modal ===== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  z-index: 1000;
  display: none;
  justify-content: center;
  align-items: flex-start;
  padding: 20px;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg);
  border-radius: var(--radius);
  width: 100%;
  max-width: 700px;
  margin-top: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  animation: modalIn .2s ease;
}
.modal-lg { max-width: 800px; }
@keyframes modalIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-header h2 { font-size: 1.05rem; }
.modal-close {
  background: none;
  border: none;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 0 4px;
  color: var(--text-muted);
}
.modal-body { padding: 20px; }

.form-group {
  margin-bottom: 16px;
}
.form-group label {
  display: block;
  font-size: .85rem;
  font-weight: 500;
  margin-bottom: 6px;
}
.form-group .required { color: var(--danger); }
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: .9rem;
  outline: none;
  transition: border .2s;
  font-family: inherit;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: .88rem;
  font-weight: 500;
  transition: all .15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary { background: #f1f5f9; color: var(--text); }
.btn-secondary:hover { background: #e2e8f0; }
.btn-sm { padding: 6px 14px; font-size: .82rem; }
.btn-xs { padding: 4px 10px; font-size: .75rem; background: none; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
.btn-xs:hover { background: var(--primary-light); }

/* ===== Detail ===== */
.detail-section { margin-bottom: 16px; }
.detail-section h4 {
  font-size: .82rem;
  color: var(--text-muted);
  margin-bottom: 6px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.detail-section .detail-body {
  font-size: .95rem;
  line-height: 1.8;
}
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.detail-tags .tag {
  font-size: .78rem;
  background: var(--primary-light);
  color: var(--primary);
  padding: 2px 10px;
  border-radius: 12px;
}
.detail-options {
  list-style: none;
  padding: 0;
}
.detail-options li {
  padding: 6px 0;
  font-size: .92rem;
}
.detail-options li.correct { color: var(--success); font-weight: 600; }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .menu-btn { display: block; }
  .sidebar {
    position: fixed;
    left: 0;
    top: 60px;
    height: calc(100vh - 60px);
    z-index: 50;
    transform: translateX(-100%);
    width: 280px;
    box-shadow: 4px 0 20px rgba(0,0,0,.15);
  }
  .sidebar.open { transform: translateX(0); }
  .main { padding: 12px; }
  .toolbar-row { flex-direction: column; }
  .filter-select { width: 100%; min-width: unset; }
  .modal-overlay { padding: 10px; align-items: flex-start; }
  .modal { margin-top: 10px; }
}

/* ===== KaTeX fix ===== */
.katex { font-size: 1.05em !important; }
.katex-display { margin: .5em 0 !important; overflow-x: auto; overflow-y: hidden; }

  </style>
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <button class="menu-btn" id="menuToggle" aria-label="菜单">☰</button>
        <h1 class="logo">📐 高中数学题库</h1>
        <div class="header-right">
          <button class="btn btn-sm" id="addFirstBtn" title="添加题目">➕ 加题</button>
          <span class="stats-badge" id="totalStats">0 题</span>
        </div>
      </div>
    </header>
    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3>📂 知识点目录</h3>
          <button class="btn btn-xs" id="collapseAll">全部折叠</button>
        </div>
        <div class="tree-container" id="treeContainer"></div>
      </aside>
      <main class="main">
        <div class="toolbar">
          <div class="toolbar-row">
            <div class="search-box">
              <input type="text" id="searchInput" placeholder="搜索题目关键词..." />
            </div>
          </div>
          <div class="toolbar-row filters-row">
            <select id="filterDifficulty" class="filter-select">
              <option value="">全部难度</option>
              <option value="基础">⭐ 基础</option>
              <option value="中等">⭐⭐ 中等</option>
              <option value="困难">⭐⭐⭐ 困难</option>
            </select>
            <select id="filterType" class="filter-select">
              <option value="">全部题型</option>
              <option value="单选题">单选题</option>
              <option value="多选题">多选题</option>
              <option value="填空题">填空题</option>
              <option value="解答题">解答题</option>
              <option value="证明题">证明题</option>
            </select>
            <span class="result-count" id="resultCount"></span>
          </div>
        </div>
        <div class="question-list" id="questionList">
          <div class="empty-state" id="emptyState">
            <div class="empty-icon">📝</div>
            <h3>还没有题目</h3>
            <p>点击右上角「加题」按钮，或点击「🌱 种子题库」一键导入</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div class="modal-overlay" id="questionModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">添加题目</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <form id="questionForm">
          <input type="hidden" id="editId" value="">
          <div class="form-group">
            <label>知识点 <span class="required">*</span></label>
            <select id="formTopic" class="form-select" required>
              <option value="">— 先选模块 —</option>
            </select>
          </div>
          <div class="form-group">
            <label>题型 <span class="required">*</span></label>
            <select id="formType" required>
              <option value="单选题">单选题</option>
              <option value="多选题">多选题</option>
              <option value="填空题">填空题</option>
              <option value="解答题">解答题</option>
              <option value="证明题">证明题</option>
            </select>
          </div>
          <div class="form-group">
            <label>难度 <span class="required">*</span></label>
            <select id="formDifficulty" required>
              <option value="基础">⭐ 基础</option>
              <option value="中等" selected>⭐⭐ 中等</option>
              <option value="困难">⭐⭐⭐ 困难</option>
            </select>
          </div>
          <div class="form-group">
            <label>题目内容 <span class="required">*</span></label>
            <textarea id="formContent" rows="4" placeholder="支持 LaTeX 公式，如 $f(x)=x^2$ 或 $$\int_a^b f(x)dx$$" required></textarea>
          </div>
          <div class="form-group" id="optionsGroup">
            <label>选项（选择题填写，每行一个选项）</label>
            <textarea id="formOptions" rows="4" placeholder="A. $x=1$&#10;B. $x=2$&#10;C. $x=3$&#10;D. $x=4$"></textarea>
          </div>
          <div class="form-group">
            <label>答案 <span class="required">*</span></label>
            <input type="text" id="formAnswer" placeholder="如：A 或 $x=2$ 或 详细解答" required />
          </div>
          <div class="form-group">
            <label>解析（可选）</label>
            <textarea id="formSolution" rows="4" placeholder="详细解题过程，支持 LaTeX"></textarea>
          </div>
          <div class="form-group">
            <label>来源（可选）</label>
            <input type="text" id="formSource" placeholder="如：高考真题/模拟题/教材改编" />
          </div>
          <div class="form-group">
            <label>标签（可选，逗号分隔）</label>
            <input type="text" id="formTags" placeholder="如：易错题,常考题" />
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-secondary" id="modalCancel">取消</button>
            <button type="submit" class="btn btn-primary">保存题目</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <h2>题目详情</h2>
        <button class="modal-close" id="detailClose">&times;</button>
      </div>
      <div class="modal-body" id="detailContent"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script>
/* ===== 高中数学题库 - 应用逻辑 ===== */

// ---- 数据 ----
const DB_KEY = 'math_quiz_bank_v1';

const tree = null; // loaded from knowledge-tree.json via fetch

let questions = [];
let currentTopicId = null; // filter
let showAnswerCache = {}; // qid -> bool

// ---- 初始化 ----

// ---- 知识点树渲染 ----
function renderTree() {
  const container = document.getElementById('treeContainer');
  const tree = KNOWLEDGE_TREE;
  let html = '';
  tree.modules.forEach(mod => {
    html += `<div class="tree-module" data-id="${mod.id}">
      <div class="tree-module-header" onclick="toggleModule('${mod.id}')">
        <span class="arrow">▶</span>
        ${mod.name} <span class="count" style="font-weight:400;font-size:.72rem;color:#94a3b8;margin-left:auto;">(${qCount(mod.id)})</span>
      </div>
      <div class="tree-chapter">`;
    mod.chapters.forEach(ch => {
      html += `<div class="tree-chapter" data-id="${ch.id}">
        <div class="tree-chapter-header" onclick="toggleChapter('${ch.id}')">
          <span class="arrow">▶</span>
          ${ch.name} <span class="count" style="font-weight:400;font-size:.72rem;color:#94a3b8;">(${qCount(ch.id)})</span>
        </div>
        <div class="tree-topics">`;
      ch.topics.forEach(t => {
        html += `<div class="tree-topic${currentTopicId === t.id ? ' active' : ''}" data-id="${t.id}" onclick="selectTopic('${t.id}')">
          ${t.name}<span class="count">${qCount(t.id)}</span>
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function toggleModule(id) {
  const el = document.querySelector(`.tree-module[data-id="${id}"]`);
  el.classList.toggle('open');
  el.querySelector('.tree-module-header .arrow').classList.toggle('open');
}

function toggleChapter(id) {
  const el = document.querySelector(`.tree-chapter[data-id="${id}"]`);
  el.classList.toggle('open');
  el.querySelector('.tree-chapter-header .arrow').classList.toggle('open');
}

function selectTopic(id) {
  currentTopicId = id;
  document.querySelectorAll('.tree-topic').forEach(el => el.classList.remove('active'));
  const el = document.querySelector(`.tree-topic[data-id="${id}"]`);
  if (el) {
    el.classList.add('active');
    // 展开父级
    el.closest('.tree-chapter')?.classList.add('open');
    el.closest('.tree-module')?.classList.add('open');
  }
  renderList();

  // 手机端自动关闭侧栏
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
  }
}

function qCount(nodeId) {
  return questions.filter(q => {
    if (q.topicId === nodeId) return true;
    // 检查是否章节id
    for (const mod of KNOWLEDGE_TREE.modules) {
      for (const ch of mod.chapters) {
        if (ch.id === nodeId) return ch.topics.some(t => q.topicId === t.id);
        if (mod.id === nodeId) return ch.topics.some(t => q.topicId === t.id);
      }
    }
    return false;
  }).length;
}

// ---- 题目数据管理 ----
function loadQuestions() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    questions = raw ? JSON.parse(raw) : [];
  } catch { questions = []; }
}

function saveQuestions() {
  localStorage.setItem(DB_KEY, JSON.stringify(questions));
  updateStats();
  renderTree(); // 刷新计数
}

function updateStats() {
  document.getElementById('totalStats').textContent = `${questions.length} 题`;
}

function getTopicName(id) {
  for (const mod of KNOWLEDGE_TREE.modules) {
    for (const ch of mod.chapters) {
      for (const t of ch.topics) {
        if (t.id === id) return `${mod.name} / ${ch.name} / ${t.name}`;
      }
    }
  }
  return id;
}

function getChapterNames(id) {
  for (const mod of KNOWLEDGE_TREE.modules) {
    for (const ch of mod.chapters) {
      if (ch.id === id) return { module: mod.name, chapter: ch.name };
      for (const t of ch.topics) {
        if (t.id === id) return { module: mod.name, chapter: ch.name, topic: t.name };
      }
    }
  }
  return { module: '', chapter: '' };
}

// ---- 渲染题目列表 ----
function renderList() {
  const list = document.getElementById('questionList');
  const resultCount = document.getElementById('resultCount');
  const emptyState = document.getElementById('emptyState');

  let filtered = [...questions];

  // 知识点过滤
  if (currentTopicId) {
    filtered = filtered.filter(q => {
      if (q.topicId === currentTopicId) return true;
      // 如果是章节一级
      for (const mod of KNOWLEDGE_TREE.modules) {
        for (const ch of mod.chapters) {
          if (ch.id === currentTopicId) return ch.topics.some(t => q.topicId === t.id);
          if (mod.id === currentTopicId) return ch.topics.some(t => q.topicId === t.id);
        }
      }
      return false;
    });
  }

  // 难度过滤
  const diffVal = document.getElementById('filterDifficulty').value;
  if (diffVal) filtered = filtered.filter(q => q.difficulty === diffVal);

  // 题型过滤
  const typeVal = document.getElementById('filterType').value;
  if (typeVal) filtered = filtered.filter(q => q.type === typeVal);

  // 搜索
  const searchVal = document.getElementById('searchInput').value.trim().toLowerCase();
  if (searchVal) {
    filtered = filtered.filter(q =>
      q.content.toLowerCase().includes(searchVal) ||
      (q.tags && q.tags.toLowerCase().includes(searchVal)) ||
      (q.solution && q.solution.toLowerCase().includes(searchVal))
    );
  }

  resultCount.textContent = `共 ${filtered.length} 题`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <h3>没有找到题目</h3>
      <p>试试其他筛选条件，或者点击右上角「加题」添加新题目</p>
    </div>`;
    return;
  }

  let html = '';
  filtered.forEach((q, idx) => {
    const info = getChapterNames(q.topicId);
    const diffClass = q.difficulty === '基础' ? 'q-badge-difficulty-easy' : q.difficulty === '中等' ? 'q-badge-difficulty-mid' : 'q-badge-difficulty-hard';
    html += `<div class="q-card" onclick="showDetail('${q.id}')">
      <div class="q-card-header">
        <span class="q-badge q-badge-topic">${info.chapter}</span>
        <span class="q-badge q-badge-type">${q.type}</span>
        <span class="q-badge ${diffClass}">${q.difficulty}</span>
      </div>
      <div class="q-card-content">${renderMath(q.content)}</div>
      <div class="q-card-answer" onclick="event.stopPropagation()">
        ${showAnswerCache[q.id] ? '✅ 答案：' + renderMath(q.answer) : '<span class="hidden-answer" onclick="toggleAnswer(\'' + q.id + '\')">👁 点击显示答案</span>'}
      </div>
      <div class="q-card-footer">
        <button onclick="event.stopPropagation();editQuestion('${q.id}')">✏️ 编辑</button>
        <button class="btn-del" onclick="event.stopPropagation();deleteQuestion('${q.id}')">🗑️ 删除</button>
      </div>
    </div>`;
  });
  list.innerHTML = html;
  renderMathInElement(list);
}

function toggleAnswer(id) {
  showAnswerCache[id] = true;
  renderList();
}

// ---- 详情弹窗 ----
function showDetail(id) {
  const q = questions.find(x => x.id === id);
  if (!q) return;
  const info = getChapterNames(q.topicId);
  const diffClass = q.difficulty === '基础' ? 'q-badge-difficulty-easy' : q.difficulty === '中等' ? 'q-badge-difficulty-mid' : 'q-badge-difficulty-hard';
  let optionsHtml = '';
  if (q.options && !q.type.includes('填空')) {
    const opts = q.options.split('\n').filter(Boolean);
    const correct = q.answer.trim().toUpperCase().split(',').map(x => x.trim());
    optionsHtml = '<ul class="detail-options">';
    opts.forEach(o => {
      const letter = o.charAt(0).toUpperCase();
      const isCorrect = correct.includes(letter);
      optionsHtml += `<li class="${isCorrect ? 'correct' : ''}">${isCorrect ? '✅ ' : ''}${o}</li>`;
    });
    optionsHtml += '</ul>';
  }

  const body = document.getElementById('detailContent');
  body.innerHTML = `
    <div class="detail-section">
      <h4>题目信息</h4>
      <div class="detail-body">
        <span class="q-badge q-badge-topic">${info.module} / ${info.chapter}</span>
        <span class="q-badge q-badge-type">${q.type}</span>
        <span class="q-badge ${diffClass}">${q.difficulty}</span>
        ${q.source ? `<span class="q-badge q-badge-topic" style="background:#fef3c7;color:#b45309;">📖 ${q.source}</span>` : ''}
      </div>
    </div>
    <div class="detail-section">
      <h4>题目</h4>
      <div class="detail-body">${renderMath(q.content)}</div>
      ${q.options && !q.type.includes('填空') ? '<h4 style="margin-top:10px;font-size:.82rem;color:var(--text-muted);font-weight:600;">选项</h4>' + optionsHtml : ''}
    </div>
    <div class="detail-section">
      <h4>答案</h4>
      <div class="detail-body" style="color:var(--success);font-weight:500;">${renderMath(q.answer)}</div>
    </div>
    ${q.solution ? `<div class="detail-section"><h4>解析</h4><div class="detail-body">${renderMath(q.solution)}</div></div>` : ''}
    ${q.tags ? `<div class="detail-section"><h4>标签</h4><div class="detail-tags">${q.tags.split(',').map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div></div>` : ''}
    <div class="detail-section" style="margin-top:4px;">
      <div class="detail-body" style="font-size:.78rem;color:var(--text-muted);">${q.source ? '来源：' + q.source + ' · ' : ''}创建时间：${new Date(q.createdAt).toLocaleString()}</div>
    </div>`;
  renderMathInElement(body);
  document.getElementById('detailModal').classList.add('open');
}

// ---- 添加/编辑题目 ----
function populateFormTopics(selectedId) {
  const sel = document.getElementById('formTopic');
  sel.innerHTML = '<option value="">— 选择知识点 —</option>';
  KNOWLEDGE_TREE.modules.forEach(mod => {
    const optgroup = document.createElement('optgroup');
    optgroup.label = mod.name;
    mod.chapters.forEach(ch => {
      ch.topics.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = `${ch.name} / ${t.name}`;
        if (t.id === selectedId) opt.selected = true;
        optgroup.appendChild(opt);
      });
    });
    sel.appendChild(optgroup);
  });
}

function openAddModal() {
  document.getElementById('modalTitle').textContent = '添加题目';
  document.getElementById('editId').value = '';
  document.getElementById('questionForm').reset();
  populateFormTopics('');
  document.getElementById('optionsGroup').style.display = 'block';
  document.getElementById('questionModal').classList.add('open');
}

function editQuestion(id) {
  const q = questions.find(x => x.id === id);
  if (!q) return;
  document.getElementById('modalTitle').textContent = '编辑题目';
  document.getElementById('editId').value = id;
  populateFormTopics(q.topicId);
  document.getElementById('formType').value = q.type || '单选题';
  document.getElementById('formDifficulty').value = q.difficulty || '中等';
  document.getElementById('formContent').value = q.content;
  document.getElementById('formOptions').value = q.options || '';
  document.getElementById('formAnswer').value = q.answer;
  document.getElementById('formSolution').value = q.solution || '';
  document.getElementById('formSource').value = q.source || '';
  document.getElementById('formTags').value = q.tags || '';
  document.getElementById('optionsGroup').style.display = (q.type && (q.type.includes('单选') || q.type.includes('多选'))) ? 'block' : 'none';
  document.getElementById('questionModal').classList.add('open');
}

// 题型切换隐藏选项
document.addEventListener('change', function(e) {
  if (e.target.id === 'formType') {
    document.getElementById('optionsGroup').style.display =
      (e.target.value.includes('单选') || e.target.value.includes('多选')) ? 'block' : 'none';
  }
});

document.getElementById('questionForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const editId = document.getElementById('editId').value;
  const topicId = document.getElementById('formTopic').value;
  if (!topicId) { alert('请选择知识点'); return; }

  const data = {
    id: editId || 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    topicId,
    type: document.getElementById('formType').value,
    difficulty: document.getElementById('formDifficulty').value,
    content: document.getElementById('formContent').value.trim(),
    options: document.getElementById('formOptions').value.trim() || '',
    answer: document.getElementById('formAnswer').value.trim(),
    solution: document.getElementById('formSolution').value.trim() || '',
    source: document.getElementById('formSource').value.trim() || '',
    tags: document.getElementById('formTags').value.trim() || '',
    createdAt: editId ? (questions.find(x => x.id === editId)?.createdAt || Date.now()) : Date.now()
  };

  if (!data.content || !data.answer) { alert('题目内容和答案不能为空'); return; }

  if (editId) {
    const idx = questions.findIndex(x => x.id === editId);
    if (idx >= 0) questions[idx] = data;
  } else {
    questions.push(data);
  }

  saveQuestions();
  renderList();
  document.getElementById('questionModal').classList.remove('open');
});

function deleteQuestion(id) {
  if (!confirm('确认删除这道题吗？')) return;
  questions = questions.filter(q => q.id !== id);
  saveQuestions();
  renderList();
}

// ---- LaTeX 渲染 ----
function renderMath(text) {
  if (!text) return '';
  // 先转义HTML
  const escaped = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 替换行内公式 $...$
  let result = escaped.replace(/\$\$(.+?)\$\$/gs, (_, m) => {
    try { return window.katex.renderToString(m, { displayMode: true, throwOnError: false }); }
    catch { return `$$${m}$$`; }
  });
  result = result.replace(/\$(.+?)\$/g, (_, m) => {
    try { return window.katex.renderToString(m, { displayMode: false, throwOnError: false }); }
    catch { return `$${m}$`; }
  });
  return result;
}

function renderMathInElement(el) {
  if (window.renderMathInElement) {
    try {
      window.renderMathInElement(el, {
        delimiters: [
          {left: '$$', right: '$$', display: true},
          {left: '$', right: '$', display: false}
        ]
      });
    } catch(e) {}
  }
}

// ---- 导出/导入 ----
function exportJSON() {
  const blob = new Blob([JSON.stringify(questions, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `math_quiz_bank_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importJSON(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      data.forEach(q => {
        if (!q.id) q.id = 'q_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        if (!q.createdAt) q.createdAt = Date.now();
      });
      questions = questions.concat(data);
      saveQuestions();
      renderList();
      alert(`成功导入 ${data.length} 题`);
    } catch(err) {
      alert('导入失败：文件格式不正确');
    }
  };
  reader.readAsText(file);
}

// ---- 绑定 UI 事件 ----
function bindUI() {
  // 菜单切换
  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
  });
  // 侧栏外点击关闭
  document.addEventListener('click', (e) => {
    if (window.innerWidth <= 768) {
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('menuToggle');
      if (!sidebar.contains(e.target) && !toggle.contains(e.target)) {
        sidebar.classList.remove('open');
      }
    }
  });

  // 加题按钮
  document.getElementById('addFirstBtn').addEventListener('click', openAddModal);

  // 弹窗关闭
  document.getElementById('modalClose').addEventListener('click', () => document.getElementById('questionModal').classList.remove('open'));
  document.getElementById('modalCancel').addEventListener('click', () => document.getElementById('questionModal').classList.remove('open'));
  document.getElementById('detailClose').addEventListener('click', () => document.getElementById('detailModal').classList.remove('open'));
  document.querySelectorAll('.modal-overlay').forEach(m => {
    m.addEventListener('click', (e) => {
      if (e.target === m) m.classList.remove('open');
    });
  });

  // 折叠全部
  document.getElementById('collapseAll').addEventListener('click', () => {
    document.querySelectorAll('.tree-module.open').forEach(el => {
      el.classList.remove('open');
      el.querySelector('.tree-module-header .arrow')?.classList.remove('open');
    });
    document.querySelectorAll('.tree-chapter.open').forEach(el => {
      el.classList.remove('open');
      el.querySelector('.tree-chapter-header .arrow')?.classList.remove('open');
    });
  });

  // 筛选/搜索变化
  document.getElementById('filterDifficulty').addEventListener('change', renderList);
  document.getElementById('filterType').addEventListener('change', renderList);
  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(renderList, 300);
  });

  // 快捷键
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
    }
  });

  // 导出导入按钮（注入到header）
  const headerRight = document.querySelector('.header-right');

  // 种子题库按钮（内嵌数据，无需服务器）
  const seedBtn = document.createElement('button');
  seedBtn.className = 'btn btn-sm';
  seedBtn.title = '一键导入30道种子题库';
  seedBtn.textContent = '🌱 种子题库';
  seedBtn.onclick = () => {
    if (questions.length > 0 && !confirm('当前已有 ' + questions.length + ' 道题目，导入种子题库会追加进去，确认继续？')) return;
    const seedData = window.SEED_QUESTIONS;
    if (!Array.isArray(seedData) || seedData.length === 0) {
      alert('种子数据为空');
      return;
    }
    const existingIds = new Set(questions.map(q => q.id));
    let count = 0;
    seedData.forEach(q => {
      if (!existingIds.has(q.id)) {
        questions.push(q);
        existingIds.add(q.id);
        count++;
      }
    });
    if (count > 0) {
      saveQuestions();
      renderList();
      alert('✅ 成功导入 ' + count + ' 道种子题目！');
    } else {
      alert('所有种子题目已存在，无需重复导入。');
    }
  };
  headerRight.insertBefore(seedBtn, headerRight.firstChild);
  const exportBtn = document.createElement('button');
  exportBtn.className = 'btn btn-sm';
  exportBtn.title = '导出题库 JSON';
  exportBtn.textContent = '📤 导出';
  exportBtn.onclick = exportJSON;
  headerRight.appendChild(exportBtn);

  const importLabel = document.createElement('label');
  importLabel.className = 'btn btn-sm';
  importLabel.style.cursor = 'pointer';
  importLabel.textContent = '📥 导入';
  const importInput = document.createElement('input');
  importInput.type = 'file';
  importInput.accept = '.json';
  importInput.style.display = 'none';
  importInput.onchange = (e) => { if (e.target.files[0]) importJSON(e.target.files[0]); };
  importLabel.appendChild(importInput);
  headerRight.appendChild(importLabel);

  updateStats();
}
